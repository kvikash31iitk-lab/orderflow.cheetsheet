# Host nginx vhost for orderflow.cheetsheet.tech on the shared box.
# Install:  /etc/nginx/sites-available/orderflow.cheetsheet.tech
#   then:   ln -s ../sites-available/orderflow.cheetsheet.tech /etc/nginx/sites-enabled/
#   test:   nginx -t  &&  systemctl reload nginx
#   TLS:    certbot --nginx -d orderflow.cheetsheet.tech     (rewrites this file to add :443)
#
# Talks to the localhost-only ports published by docker-compose.vps.yml.
server {
    listen 80;
    listen [::]:80;
    server_name orderflow.cheetsheet.tech;

    # WebSocket feed (FastAPI) -- must come before "/" and carry the upgrade headers
    location /ws {
        proxy_pass http://127.0.0.1:8102;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }

    # REST API (FastAPI)
    location /api/ {
        proxy_pass http://127.0.0.1:8102;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # SC1 research sweeps are CPU-bound and can run tens of seconds (off the event
        # loop). Raise above nginx's 60s default so a sweep doesn't 504. Live endpoints
        # (footprints/status) are fast and unaffected.
        proxy_read_timeout 180s;
        proxy_send_timeout 180s;
    }

    # React SPA (the frontend container's own nginx already does try_files fallback)
    location / {
        proxy_pass http://127.0.0.1:8101;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
